# Experiment config — Gated U-Net baseline (DeepFillv2-style)
# Yu et al., ICCV 2019, arXiv:1806.03589
#
# Identical hyperparameters to pconv_unet.yaml and unet_baseline.yaml
# except for `model.arch` and per-experiment paths.  Fairness contract.
#
# NOTE: Gated convolution duplicates conv weights (feat + gate path),
# so this model has roughly 1.9x the parameters of PConvUNet.  This is
# accepted as documented architectural difference; the comparison
# claims fairness in *training recipe*, not in *model capacity*.

experiment:
  name: gated_unet
  seed: 42
  description: >
    Gated convolution U-Net (DeepFillv2-style) trained from scratch on
    full WikiArt with the same Liu et al. 2018 loss.  Modern strong
    baseline competitor to PConv on free-form irregular masks.

# ── Data ──────────────────────────────────────────────────────────────
data:
  splits_dir: /content/drive/MyDrive/art_restoration/data/splits
  train_csv: train.csv
  val_csv:   val.csv
  test_csv:  test.csv
  image_size: 256
  difficulty: medium
  num_workers: 2
  pin_memory: true

# ── Model ─────────────────────────────────────────────────────────────
model:
  arch: gated_unet
  in_channels:  3
  out_channels: 3

# ── Loss weights — IDENTICAL ──────────────────────────────────────────
loss:
  lambda_valid: 1.0
  lambda_hole:  6.0
  lambda_perc:  0.05
  lambda_style: 50.0
  lambda_tv:    0.1

# ── Optimization — IDENTICAL ──────────────────────────────────────────
optim:
  type: adam
  lr: 2.0e-4
  betas: [0.9, 0.999]
  weight_decay: 0.0

scheduler:
  type: cosine
  warmup_epochs: 1
  min_lr: 1.0e-6

# ── Training loop — IDENTICAL ─────────────────────────────────────────
train:
  batch_size: 4
  num_epochs: 12          # reduced from 20 to fit free-tier compute budget (Plan v2)
  grad_clip: 1.0
  amp: true              # safe — InpaintingLoss internally forces fp32 to avoid Gram-matrix overflow
  log_every: 50
  validate_every: 1

# ── Checkpoints / logging — per-experiment paths ─────────────────────
checkpoint:
  dir: /content/drive/MyDrive/art_restoration/checkpoints/gated_unet
  save_every: 5
  metric_for_best: psnr
  resume: auto

logging:
  log_dir: /content/drive/MyDrive/art_restoration/logs/gated_unet
  csv_filename: training_log.csv
  num_vis_samples: 8

# ── Early stopping — IDENTICAL ────────────────────────────────────────
early_stopping:
  enabled: true
  patience: 8
  min_delta: 1.0e-3

eval:
  compute_fid: true
  compute_lpips: true
